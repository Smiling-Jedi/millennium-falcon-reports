<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中来股份 · 交易计划 · 千年隼</title>
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="masthead container">
        <div class="masthead-top">
            <div class="brand">
                <div class="logo-mark">M</div>
                <div class="brand-title">
                    <span class="zh">千年隼</span>
                    <span class="en">Millennium Falcon</span>
                </div>
            </div>
            <div class="issue">
                <div class="day">16</div>
                <div class="meta">Jun · Tuesday</div>
            </div>
        </div>
    </header>


    <div class="container">
        <a href="watchlist.html" class="back-nav"><span class="arrow">←</span> 返回日报首页</a>
    </div>

    <header class="stock-hd container">
        <div class="stock-hd-row">
            <div>
                <div class="stock-name">中来股份</div>
                <div class="stock-code">SZ.300393 · A股</div>
            </div>
            <div class="stock-price">
                <div class="price">9.93</div>
                <div class="change flat">0.00%</div>
            </div>
        </div>
    </header>

    <div class="status-bar container">
        <span class="status-item">类型 <strong>观察仓（不套用 A/B/D/E/F 框架，1.1% 仓位不值得）</strong></span>
        <span class="status-item">持仓 <strong>5,000 股 @¥9.934</strong></span>
    </div>

    <div class="container">
            <div class="daily-check">
                <div class="dc-title">⚡ 日检对照 <span style="font-size:10px;color:var(--ink-soft)">（计划文本提取）</span></div>
                <div class="dc-rows">
        <div class="dc-row"><span class="dc-label">窗口</span><span class="dc-val">—</span></div>
        <div class="dc-row"><span class="dc-label">止跌</span><span class="dc-val">—</span></div>
        <div class="dc-row"><span class="dc-label">预警</span><span class="dc-val dc-ok">无</span></div>
                </div>
            </div>
        </div>

    <section class="section container">
        <div class="section-title">交易计划<span class="ver">v1 · —</span></div>
        <div class="plan-card">
        <div class="plan-section">
            <div class="ps-label">止损</div>
            <div class="ps-row"><span class="v">¥6.37（120 日低点）跌破 → 无条件清仓。最多再亏 ¥1.3 万，伤不到筋骨。</span></div>
        </div>
        </div>
    </section>


    <footer class="site-foot container">千年隼 MILLENNIUM FALCON · 最后更新 2026-06-16 23:12</footer>
</body>
</html>
