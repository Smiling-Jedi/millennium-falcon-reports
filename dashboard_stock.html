        .val-warn { color: #ca8a04; }
        .val-ok { color: #16a34a; }
        .val-blue { color: #2563eb; }

            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 12px 4px 8px;
            margin-bottom: 16px;

            font-weight: 600;
            color: #475569;
            padding: 0 8px 6px;

            color: #475569;

<script>
(function() {
    var raw = document.getElementById('mf-stock-data').textContent;
    var allData = JSON.parse(raw);
    var stocks = allData.stocks || {};

    // ── 读 URL hash ──
    var code = window.location.hash.slice(1) || Object.keys(stocks)[0];
    var s = stocks[code];
    if (!s) {
        // 尝试模糊匹配
        var found = Object.keys(stocks).find(function(k) { return k.indexOf(code) >= 0 || (stocks[k].name||'').indexOf(code) >= 0; });
        if (found) { code = found; s = stocks[code]; }
    }
    if (!s) {
        document.body.innerHTML = '<div style="text-align:center;padding:60px 20px;color:#94a3b8;">未找到该股票<br/><a href="dashboard.html" style="color:#2563eb;">← 返回仪表盘</a></div>';
        return;
    }

    document.title = s.name + ' - 千年隼';
    document.getElementById('updateTime').textContent = allData.update_time || '';

    // ── 头部 ──
    var mktLabel = s.market === 'A' ? 'A股' : (s.market === 'HK' ? '港股' : '美股');
    var mktClass = 'mkt-tag-' + s.market.toLowerCase();
    var sigClass = 'signal-' + s.signal;
    var sigLabel = {buy:'值得关注', watch:'接近恐慌线', caution:'偏高提醒', normal:'正常'}[s.signal] || s.signal;
    document.getElementById('stockHeader').innerHTML =
        '<a href="dashboard.html" class="back">← 仪表盘</a>' +
        '<div class="stock-header">' +
            '<span class="stock-name">' + s.name + '</span>' +
            '<span class="mkt-tag ' + mktClass + '">' + mktLabel + '</span>' +
            '<span class="signal-tag ' + sigClass + '">' + sigLabel + '</span>' +
        '</div>';

    // ── 快捷统计 ──
    var rsiColor = s.signal === 'caution' ? 'val-danger' : (s.signal === 'buy' ? 'val-ok' : (s.rsi_14 >= 70 ? 'val-danger' : (s.rsi_14 <= 30 ? 'val-warn' : '')));

                    var p = params[0];
                    var rsi = p.value[1];
                    var label = rsi >= 70 ? '超买' : (rsi <= 30 ? '超卖' : (rsi >= 60 ? '偏强' : (rsi <= 40 ? '偏弱' : '中性')));
                    return p.value[0] + '<br/>RSI: <b>' + rsi.toFixed(1) + '</b> (' + label + ')';
                }
            },
            grid: { left: 48, right: 20, top: 16, bottom: 32 },
            xAxis: {
                type: 'category',
                data: validData.map(function(d) { return d.date; }),
                axisLabel: {
                    fontSize: 10,
                    formatter: function(v) { return v ? v.slice(5) : ''; },
                    interval: Math.max(1, Math.floor(validData.length / 6))
                }
            },
            yAxis: {
                type: 'value',
                min: 0, max: 100,
                name: 'RSI',
                nameTextStyle: { fontSize: 10, color: '#64748b' },
                axisLabel: { fontSize: 10 },
                splitLine: { lineStyle: { color: '#f1f5f9' } }
            },
            series: [{
                type: 'line',
                data: validData.map(function(d) { return [d.date, d.rsi]; }),
                smooth: true,
                symbol: 'none',
                lineStyle: { color: '#2563eb', width: 1.5 },
                areaStyle: {
                    color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                        { offset: 0, color: 'rgba(37,99,235,0.12)' },
                        { offset: 1, color: 'rgba(37,99,235,0.02)' }
                    ])
                },
                markLine: {
                    silent: true, symbol: 'none',
                    data: markLines.concat([
                        { yAxis: 70, lineStyle: { color: '#fca5a5', type: 'dashed', width: 1 }, label: { formatter: '70', fontSize: 9 } },
                        { yAxis: 30, lineStyle: { color: '#86efac', type: 'dashed', width: 1 }, label: { formatter: '30', fontSize: 9 } }
                    ])
                }
            }]
        });
        window.addEventListener('resize', function() { rsiChart.resize(); });
    }

    // ── 回撤事件列表 ──
    var ddContainer = document.getElementById('ddEvents');
    var ddEvents = s.drawdown_events || [];
    if (ddEvents.length === 0) {
        ddContainer.innerHTML += '<div class="no-data">近5年未出现 >15% 的显著回撤</div>';
    } else {
        var ddHtml = '<h3>历史回撤事件（近5年）</h3>';
        ddEvents.forEach(function(e) {
            var recText = e.recovery_days != null ? e.recovery_days + ' 天' : '未恢复';
            ddHtml += '<div class="dd-card">' +
                '<div class="dd-card-row">' +
                    '<span class="dd-depth">' + e.depth_pct + '%</span>' +
                    '<span class="dd-date-range">' + e.start_date + ' → ' + e.trough_date + '</span>' +
                '</div>' +
                '<div class="dd-meta">' +
                    '<span>📉 下跌 ' + Math.abs(e.duration_days) + ' 天</span>' +
                    '<span>📈 恢复 ' + recText + '</span>' +
                '</div>' +
            '</div>';
        });
        ddContainer.innerHTML = ddHtml;
    }

    // ── 情绪指数曲线 ──
    var seDom = document.getElementById('sentimentChart');
    if (seDom) {
        var seChart = echarts.init(seDom);
        var sentHistory = s.sentiment_history || [];
        var sentDates = sentHistory.map(function(h) { return h.date; });
        var sentScores = sentHistory.map(function(h) { return h.score; });

        seChart.setOption({
            tooltip: {
                trigger: 'axis',
                formatter: function(params) {
                    var p = params[0];
                    var v = p.value[1];
                    var label = v >= 75 ? '恐慌' : (v >= 50 ? '焦虑' : (v >= 25 ? '关注' : '平静'));
                    return p.value[0] + '<br/>情绪: <b>' + v + '</b> (' + label + ')';
                }
            },
            grid: { left: 40, right: 24, top: 16, bottom: 32 },
            xAxis: {
                type: 'category',
                data: sentDates.length > 0 ? sentDates : [allData.update_time ? allData.update_time.slice(0,10) : '2026-06-03'],
                axisLabel: { fontSize: 10 }
            },
            yAxis: {
                type: 'value',
                min: 0, max: 100,
                name: '恐慌强度',
                nameTextStyle: { fontSize: 10, color: '#64748b' },
                axisLabel: { fontSize: 10, formatter: '{value}' },
                splitLine: { lineStyle: { color: '#f1f5f9' } },
                // 标注区域
                axisPointer: { show: true }
            },
            series: [{
                type: 'line',
                data: sentDates.map(function(d, i) { return [d, sentScores[i]]; }),
                smooth: true,
                symbol: 'circle',
                symbolSize: 8,
                lineStyle: { color: '#8b5cf6', width: 2 },
                itemStyle: { color: '#8b5cf6' },
                areaStyle: {
                    color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                        { offset: 0, color: 'rgba(139,92,246,0.15)' },
                        { offset: 1, color: 'rgba(139,92,246,0.02)' }
                    ])
                },
                markLine: {
                    silent: true, symbol: 'none',
                    data: [
                        { yAxis: 25, lineStyle: { color: '#e2e8f0', type: 'dashed', width: 1 }, label: { formatter: '关注', fontSize: 9, color: '#94a3b8' } },
                        { yAxis: 50, lineStyle: { color: '#e2e8f0', type: 'dashed', width: 1 }, label: { formatter: '焦虑', fontSize: 9, color: '#94a3b8' } },
                        { yAxis: 75, lineStyle: { color: '#e2e8f0', type: 'dashed', width: 1 }, label: { formatter: '恐慌', fontSize: 9, color: '#94a3b8' } }
                    ]
                }
            }]
        });

        window.addEventListener('resize', function() { seChart.resize(); });
    }

    // ── 如果没有情绪数据，显示提示 ──
    if (!s.sentiment_history || s.sentiment_history.length === 0) {
        var seSection = document.querySelector('.chart-section:last-of-type');
        if (seSection) {
            seSection.querySelector('.chart-box-small').innerHTML =
                '<div style="text-align:center;padding:40px 20px;color:#94a3b8;font-size:14px;">当前情绪: <b style="color:#8b5cf6;">' +
                s.sentiment_label + '(' + s.sentiment_score + '分)</b><br/><span style="font-size:12px;">历史曲线将从今天开始累积</span></div>';
        }
    }

})();
</script>

</body>
</html>
