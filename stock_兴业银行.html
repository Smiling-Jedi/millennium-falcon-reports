<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>兴业银行 - 千年隼日报</title>
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="千年隼">
    <meta name="theme-color" content="#1e293b">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #fafbfc;
            color: #2c3e50;
            padding: 36px 24px 48px;
            max-width: 480px;
            margin: 0 auto;
            line-height: 1.6;
        }
        .logo-img {
            width: 24px;
            height: 24px;
            border-radius: 5px;
            vertical-align: middle;
            margin-right: 6px;
            position: relative;
            top: -2px;
        }
        .back {
            font-size: 13px;
            color: #94a3b8;
            text-decoration: none;
            margin-bottom: 20px;
            display: inline-block;
        }
        .back:hover { color: #64748b; }
        h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }
        .subtitle {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 28px;
        }
        .update-badge {
            display: inline-block;
            font-size: 11px;
            color: #64748b;
            margin-bottom: 24px;
        }
        .menu-item {
            display: block;
            padding: 18px 0;
            text-decoration: none;
            color: #2c3e50;
            font-size: 16px;
            font-weight: 500;
            border-bottom: 1px solid #f0f0f0;
        }
        .menu-item:last-child { border-bottom: none; }
        .menu-item:active { color: #2563eb; }
        .menu-count {
            display: inline-block;
            background: #e8edf2;
            color: #64748b;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 6px;
            font-weight: 500;
            vertical-align: middle;
        }
        /* 市场标签色 */
        .mkt-a { color: #dc2626; }
        .mkt-hk { color: #16a34a; }
        .mkt-us { color: #2563eb; }
        h2 .mkt-dot {
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle;
            position: relative;
            top: -1px;
        }
        .mkt-dot-a { background: #dc2626; }
        .mkt-dot-hk { background: #16a34a; }
        .mkt-dot-us { background: #2563eb; }
        h2 {
            font-size: 13px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 32px 0 12px;
        }
        h3 {
            font-size: 14px;
            font-weight: 600;
            color: #475569;
            margin: 20px 0 10px;
        }
        .stock-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .stock-item {
            padding: 7px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 4px;
            text-decoration: none;
            color: #475569;
            font-size: 16px;
            transition: all .15s;
        }
        .stock-item:active { border-color: #2563eb; color: #2563eb; background: #f0f5ff; }
        .stock-item-up { border-color: #fecaca; background: transparent; color: #475569; }
        .stock-item-down { border-color: #a5d6a7; background: transparent; color: #475569; }
        .report-link {
            display: block;
            padding: 14px 0;
            border-bottom: 1px solid #f0f0f0;
            text-decoration: none;
            color: #2c3e50;
            font-size: 15px;
        }
        .report-link:last-child { border-bottom: none; }
        .report-link:active { color: #2563eb; }
        .report-date {
            display: inline-block;
            font-size: 12px;
            font-weight: 500;
            margin-right: 10px;
            font-variant-numeric: tabular-nums;
        }
        .report-date.new { color: #2563eb; }
        .report-date.today { color: #dc2626; }
        .report-date.chg-up { color: #fca5a5; }
        .report-date.chg-down { color: #81c784; }
        .stock-code {
            font-size: 12px;
            color: #94a3b8;
            margin-left: 6px;
            font-weight: 400;
        }
        .mkt-tag {
            display: inline-block;
            font-size: 10px;
            font-weight: 600;
            padding: 1px 6px;
            border-radius: 3px;
            margin-right: 6px;
            vertical-align: middle;
            position: relative;
            top: -1px;
        }
        .mkt-tag-a { background: #fef2f2; color: #dc2626; }
        .mkt-tag-hk { background: #f0fdf4; color: #16a34a; }
        .mkt-tag-us { background: #eff6ff; color: #2563eb; }
        .page-intro {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 24px;
        }
        .footer {
            margin-top: 48px;
            padding-top: 16px;
            border-top: 1px solid #e2e8f0;
            font-size: 11px;
            color: #94a3b8;
        }
        .new-dot {
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #2563eb;
            margin-right: 4px;
            vertical-align: middle;
            position: relative;
            top: -1px;
            animation: pulse-dot 2s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .new-dot-sm {
            display: inline-block;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #2563eb;
            margin-right: 6px;
            vertical-align: middle;
            position: relative;
            top: -2px;
            animation: pulse-dot 2s ease-in-out infinite;
        }
    </style>
</head>
<body>

</body>
</html>
<script>
(function(){
var K='mf_seen_';
var els=document.querySelectorAll('[data-stock]');
for(var i=0;i<els.length;i++){var e=els[i];
var n=e.getAttribute('data-stock');
var d=e.getAttribute('data-date');
var r=e.getAttribute('data-has-reply')==='1';
var sk=K+n,h=localStorage.getItem(sk)||'';
if(d>h||r){var dot=document.createElement('span');
dot.className='new-dot';e.insertBefore(dot,e.firstChild);
(function(dt){e.addEventListener('click',function(){localStorage.setItem(K+e.getAttribute('data-stock'),dt||e.getAttribute('data-date'));});})(d);}
})();
</script>
