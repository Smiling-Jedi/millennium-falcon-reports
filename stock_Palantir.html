<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palantir - 千年隼日报</title>
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="千年隼">
    <meta name="theme-color" content="#1e293b">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #fafbfc;
            color: #2c3e50;
            padding: 36px 24px 48px;
            max-width: 480px;
            margin: 0 auto;
            line-height: 1.6;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
        }
        .logo img {
            width: 36px;
            height: 36px;
            border-radius: 8px;
        }
        .logo-text {
            font-size: 14px;
            font-weight: 700;
            color: #1e293b;
            letter-spacing: 0.3px;
        }
        .back {
            font-size: 13px;
            color: #94a3b8;
            text-decoration: none;
            margin-bottom: 20px;
            display: inline-block;
        }
        .back:hover { color: #64748b; }
        h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }
        .subtitle {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 28px;
        }
        .update-badge {
            display: inline-block;
            font-size: 11px;
            color: #64748b;
            margin-bottom: 24px;
        }
        .menu-item {
            display: block;
            padding: 18px 0;
            text-decoration: none;
            color: #2c3e50;
            font-size: 16px;
            font-weight: 500;
            border-bottom: 1px solid #f0f0f0;
        }
        .menu-item:last-child { border-bottom: none; }
        .menu-item:active { color: #2563eb; }
        .menu-count {
            display: inline-block;
            background: #e8edf2;
            color: #64748b;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 6px;
            font-weight: 500;
            vertical-align: middle;
        }
        /* 市场标签色 */
        .mkt-a { color: #dc2626; }
        .mkt-hk { color: #16a34a; }
        .mkt-us { color: #2563eb; }
        h2 .mkt-dot {
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle;
            position: relative;
            top: -1px;
        }
        .mkt-dot-a { background: #dc2626; }
        .mkt-dot-hk { background: #16a34a; }
        .mkt-dot-us { background: #2563eb; }
        h2 {
            font-size: 13px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 32px 0 12px;
        }
        h3 {
            font-size: 14px;
            font-weight: 600;
            color: #475569;
            margin: 20px 0 10px;
        }
        .stock-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .stock-item {
            padding: 7px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 4px;
            text-decoration: none;
            color: #475569;
            font-size: 13px;
            transition: all .15s;
        }
        .stock-item:active { border-color: #2563eb; color: #2563eb; background: #f0f5ff; }
        .report-link {
            display: block;
            padding: 14px 0;
            border-bottom: 1px solid #f0f0f0;
            text-decoration: none;
            color: #2c3e50;
            font-size: 15px;
        }
        .report-link:last-child { border-bottom: none; }
        .report-link:active { color: #2563eb; }
        .report-date {
            display: inline-block;
            font-size: 12px;
            font-weight: 500;
            margin-right: 10px;
            font-variant-numeric: tabular-nums;
        }
        .report-date.new { color: #2563eb; }
        .report-date.today { color: #dc2626; }
        .stock-code {
            font-size: 12px;
            color: #94a3b8;
            margin-left: 6px;
            font-weight: 400;
        }
        .mkt-tag {
            display: inline-block;
            font-size: 10px;
            font-weight: 600;
            padding: 1px 6px;
            border-radius: 3px;
            margin-right: 6px;
            vertical-align: middle;
            position: relative;
            top: -1px;
        }
        .mkt-tag-a { background: #fef2f2; color: #dc2626; }
        .mkt-tag-hk { background: #f0fdf4; color: #16a34a; }
        .mkt-tag-us { background: #eff6ff; color: #2563eb; }
        .page-intro {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 24px;
        }
        .footer {
            margin-top: 48px;
            padding-top: 16px;
            border-top: 1px solid #e2e8f0;
            font-size: 11px;
            color: #cbd5e1;
        }
    </style>
</head>
<body>
    <div class="logo">
        <img src="favicon-32x32.png" width="36" height="36" alt="">
        <span class="logo-text">千年隼</span>
    </div>

    <div class="footer">千年隼 Millennium Falcon · 最后更新 2026-05-29 21:55</div>
</body>
</html>
