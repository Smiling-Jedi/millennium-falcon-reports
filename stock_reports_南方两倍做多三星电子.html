<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>南方两倍做多三星电子 · 日报汇总 · 千年隼</title>
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <style>
        :root {
            --bg:       #ffffff;
            --paper:    #faf9f7;
            --ink:      #111111;
            --ink-soft: #6b6b6b;
            --ink-faint:#9a9a9a;
            --line:     #e8e5e1;
            --line-dark:#1a1a1a;
            --red:      #b86b6b;
            --green:    #5b8c6f;
            --blue:     #6b8aab;
            --amber:    #c8873b;
            --gray:     #9a9a9a;
            --tag-hold-bg:#e8f5e9; --tag-hold-ink:#2e7d32; --tag-hold-line:#c8e6c9;
            --tag-watch-bg:#f5f5f5; --tag-watch-ink:#616161; --tag-watch-line:#e0e0e0;
            --tag-scout-bg:#e3f2fd; --tag-scout-ink:#1565c0; --tag-scout-line:#bbdefb;
            --tag-stop-bg:#ffebee; --tag-stop-ink:#c62828; --tag-stop-line:#ffcdd2;
            --tag-add-bg:#fff3e0; --tag-add-ink:#e65100; --tag-add-line:#ffe0b2;
            --serif-zh: "Noto Serif SC", "Source Han Serif SC", "Songti SC", serif;
            --serif-en: "Cormorant Garamond", "Playfair Display", "Georgia", serif;
            --pad-x: 16px;
            --card-pad: 16px;
            --radius-card: 12px;
            --shadow-card: 0 2px 8px rgba(0,0,0,0.06);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { -webkit-font-smoothing: antialiased; }
        body {
            font-family: var(--serif-zh);
            background: var(--bg);
            color: var(--ink);
            padding: 32px 0 56px;
            max-width: 560px;
            margin: 0 auto;
            line-height: 1.55;
            font-size: 16px;
        }
        .container { padding-left: var(--pad-x); padding-right: var(--pad-x); }
        a { text-decoration: none; color: inherit; }

        /* ===== MASTHEAD ===== */
        .masthead {
            border-bottom: 1.5px solid var(--line-dark);
            padding-bottom: 14px;
            margin-bottom: 14px;
        }
        .masthead-top, .masthead-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-mark, .brand-mark {
            width: 38px; height: 38px;
            border-radius: 9px;
            background: #d46b46;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--serif-en);
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -1px;
        }
        .brand-title .zh, .brand-text .zh {
            display: block;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 5px;
            line-height: 1.1;
        }
        .brand-title .en, .brand-text .en {
            display: block;
            font-family: var(--serif-en);
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--ink-soft);
            margin-top: 2px;
        }
        .issue {
            text-align: right;
            font-family: var(--serif-en);
        }
        .issue .day { font-size: 28px; font-weight: 500; line-height: 1; }
        .issue .meta {
            font-size: 10px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--ink-soft);
            margin-top: 2px;
        }

        /* ===== BACK NAV ===== */
        .back-nav {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--ink-soft);
            margin-bottom: 16px;
            letter-spacing: 0.5px;
        }
        .back-nav .arrow { font-family: var(--serif-en); font-size: 14px; }

        /* ===== PAGE TITLE ===== */
        .page-title {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 1px;
            margin: 8px 0 18px;
        }

        /* ===== STOCK HEADER ===== */
        .stock-hd {
            border-bottom: 1.5px solid var(--line-dark);
            padding-bottom: 16px;
            margin-bottom: 14px;
        }
        .stock-hd-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        .stock-name {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 2px;
        }
        .stock-code {
            font-family: var(--serif-en);
            font-size: 13px;
            color: var(--ink-soft);
            letter-spacing: 1px;
            margin-top: 2px;
        }
        .stock-price { text-align: right; }
        .stock-price .price {
            font-family: var(--serif-en);
            font-size: 30px;
            font-weight: 600;
            line-height: 1;
        }
        .stock-price .change {
            font-size: 13px;
            margin-top: 4px;
        }
        .change.up   { color: var(--red); }
        .change.down { color: var(--green); }

        /* ===== STATUS BAR ===== */
        .status-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }
        @media (max-width: 400px) {
            .status-bar { grid-template-columns: repeat(2, 1fr); }
        }
        .status-item {
            font-size: 13px;
            padding: 3px 10px;
            border-radius: 4px;
            border: 1px solid var(--line);
            color: var(--ink-soft);
            white-space: nowrap;
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .status-item strong { color: var(--ink); }

        /* ===== SECTION ===== */
        .section { margin-bottom: 20px; }
        .section-title {
            font-size: 17px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--line);
        }
        .section-title .ver {
            font-size: 11px;
            color: var(--ink-faint);
            font-weight: 400;
            margin-left: 6px;
        }

        /* ===== PLAN CARD ===== */
        .plan-card {
            background: var(--bg);
            border: 1px solid var(--line);
            border-radius: var(--radius-card);
            padding: var(--card-pad);
            box-shadow: var(--shadow-card);
        }
        .plan-section {
            padding: 12px 0;
            border-bottom: 1px dotted var(--line);
        }
        .plan-section:last-child { border-bottom: none; padding-bottom: 0; }
        .plan-section:first-child { padding-top: 0; }
        .ps-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--ink-faint);
            margin-bottom: 6px;
        }
        .ps-row {
            display: flex;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 3px;
        }
        .ps-row .k {
            flex: 0 0 68px;
            font-weight: 600;
            color: var(--ink-soft);
            font-size: 13px;
        }
        .ps-row .v { flex: 1; }
        .sig-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px 16px;
            margin-top: 6px;
        }
        .sig-item {
            font-size: 13px;
            display: flex;
            gap: 5px;
            align-items: center;
        }
        .sig-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .sig-dot.on  { background: var(--green); }
        .sig-dot.off { background: var(--red); }
        .chip {
            font-size: 11px;
            font-weight: 700;
            padding: 1px 7px;
            border-radius: 3px;
            margin-left: 4px;
        }
        .chip.ok   { background: var(--tag-hold-bg); color: var(--tag-hold-ink); }
        .chip.no   { background: var(--tag-stop-bg); color: var(--tag-stop-ink); }
        .chip.wait { background: var(--tag-watch-bg); color: var(--tag-watch-ink); }

        /* ===== DAILY CHECK ===== */
        .daily-check {
            background: var(--paper);
            border: 1px solid var(--line);
            border-radius: var(--radius-card);
            padding: 14px var(--card-pad);
            margin-bottom: 20px;
        }
        .daily-check .dc-title {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--ink-soft);
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .dc-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px 12px;
        }
        .dc-item { font-size: 13px; }
        .dc-item .l { color: var(--ink-soft); }
        .dc-item .val { font-weight: 600; }
        .dc-item.risk { background: #fff5f5; border-left: 3px solid var(--red); padding: 4px 8px; border-radius: 0 4px 4px 0; }
        .dc-item.safe { background: #e8f5e9; border-left: 3px solid var(--green); padding: 4px 8px; border-radius: 0 4px 4px 0; }

        /* ===== REPORT LIST ===== */
        .report-list {
            list-style: none;
            border-left: 2px solid var(--line);
            padding-left: 14px;
        }
        .report-list li {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 9px 0;
            border-bottom: 1px solid var(--line);
            position: relative;
        }
        .report-list li::before {
            content: '';
            position: absolute;
            left: -17px;
            top: 14px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--line);
            border: 2px solid var(--bg);
        }
        .report-list li:first-child::before { background: var(--red); }
        .report-list li:last-child { border-bottom: none; }
        .report-list .r-date {
            font-family: var(--serif-en);
            font-size: 13px;
            color: var(--ink-soft);
            min-width: 56px;
        }
        .report-list .r-title {
            flex: 1;
            font-size: 15px;
            margin: 0 12px;
        }
        .report-list .r-tag {
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 3px;
            white-space: nowrap;
        }
        .r-tag.sell  { background: var(--tag-stop-bg);  color: var(--tag-stop-ink); }
        .r-tag.hold  { background: var(--tag-hold-bg);  color: var(--tag-hold-ink); }
        .r-tag.buy   { background: var(--tag-scout-bg); color: var(--tag-scout-ink); }
        .r-tag.watch { background: var(--tag-watch-bg); color: var(--tag-watch-ink); }
        .r-tag.add   { background: var(--tag-add-bg);   color: var(--tag-add-ink); }

        /* ===== EXTERNAL LINKS ===== */
        .ext-links {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 8px;
        }
        .ext-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            border: 1px solid var(--line);
            border-radius: 8px;
            font-size: 14px;
            transition: background 0.15s;
        }
        .ext-link:hover { background: var(--paper); }

        /* ===== SNAPSHOT LIST ===== */
        .snapshot-list {
            list-style: none;
            border-left: 2px solid var(--line);
            padding-left: 16px;
        }
        .snapshot-list li {
            position: relative;
            padding: 14px 0 18px;
            border-bottom: 1px solid var(--line);
        }
        .snapshot-list li:last-child { border-bottom: none; }
        .snapshot-list li::before {
            content: '';
            position: absolute;
            left: -21px;
            top: 20px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--line);
            border: 2px solid var(--bg);
        }
        .snapshot-list li:first-child::before { background: var(--red); }
        .snap-date {
            font-family: var(--serif-en);
            font-size: 12px;
            color: var(--ink-soft);
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        .snap-title {
            font-size: 16px;
            font-weight: 600;
            line-height: 1.45;
            color: var(--ink);
        }
        .snap-title:hover { color: var(--ink-soft); }

        /* ===== FOOTER ===== */
        .site-foot, .footer {
            margin-top: 32px;
            padding-top: 16px;
            border-top: 1px solid var(--line);
            text-align: center;
            font-size: 11px;
            color: var(--ink-faint);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <header class="masthead container">
        <div class="masthead-top">
            <div class="brand">
                <div class="logo-mark">M</div>
                <div class="brand-title">
                    <span class="zh">千年隼</span>
                    <span class="en">Millennium Falcon</span>
                </div>
            </div>
            <div class="issue">
                <div class="day">14</div>
                <div class="meta">Jun · Sunday</div>
            </div>
        </div>
    </header>


    <div class="container">
        <a href="stock_南方两倍做多三星电子.html" class="back-nav"><span class="arrow">←</span> 返回交易计划</a>
    </div>

    <header class="stock-hd container">
        <div class="stock-hd-row">
            <div>
                <div class="stock-name">南方两倍做多三星电子</div>
                <div class="stock-code">HK.07747 · 港股</div>
            </div>
            <div class="stock-price">
                <div class="price">—</div>
                <div class="change flat">0.00%</div>
            </div>
        </div>
    </header>

    <div class="status-bar container">

    </div>

    <section class="section container">
        <div class="section-title">历史日报</div>
        <ul class="report-list">
        <li>
            <span class="r-date">06-11</span>
            <span class="r-title">【持有】高位宽幅震荡中，缩量回踩未破前低</span>
            <span class="r-tag hold">持有</span>
        </li>
        <li>
            <span class="r-date">06-10</span>
            <span class="r-title">【观望】韩股熔断拖累单日暴跌12%，暂无交易计划保持关注</span>
            <span class="r-tag watch">观望</span>
        </li>
        <li>
            <span class="r-date">06-09</span>
            <span class="r-title">日报</span>
            <span class="r-tag watch">观望</span>
        </li>
        </ul>
    </section>


    <footer class="site-foot container">千年隼 MILLENNIUM FALCON · 最后更新 2026-06-14 10:30</footer>
</body>
</html>
