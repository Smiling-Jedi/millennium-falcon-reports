<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>持仓 Treemap 预览</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", sans-serif;
            background: #F7F5F2;
            color: #3D3D3D;
            min-height: 100vh;
            padding: 0;
        }
        .header {
            padding: 16px 16px 8px;
            background: #F7F5F2;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .header h1 {
            font-size: 20px;
            font-weight: 700;
            color: #3D3D3D;
            letter-spacing: 0.5px;
        }
        .header .sub {
            font-size: 12px;
            color: #9B958C;
            margin-top: 2px;
        }
        .treemap-wrap {
            padding: 8px 16px 24px;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .market-section {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            padding-top: 24px;
        }
        .market-label {
            position: absolute;
            top: 6px;
            left: 10px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            z-index: 5;
            padding: 2px 8px;
            border-radius: 10px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(4px);
        }
        .market-label .dot {
            display: inline-block;
            width: 7px; height: 7px;
            border-radius: 50%;
            margin-right: 4px;
            vertical-align: middle;
        }
        /* A股 - 莫兰迪紫 */
        .market-a { background: #F5F0FA; }
        .market-a .market-label { color: #7A5A9C; }
        .market-a .dot { background: #927BBE; }
        /* 港股 - 鼠尾草绿 */
        .market-hk { background: #F0F5F1; }
        .market-hk .market-label { color: #5A7A66; }
        .market-hk .dot { background: #7FA68B; }
        /* 美股 - 雾蓝 */
        .market-us { background: #F0F4F6; }
        .market-us .market-label { color: #5A7A8A; }
        .market-us .dot { background: #6F97A8; }

        .treemap-cell {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: inherit;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            cursor: pointer;
            overflow: hidden;
        }
        .treemap-cell:active {
            transform: scale(0.97);
            z-index: 10;
        }
        .cell-border {
            position: absolute;
            inset: 1.5px;
            border-radius: 8px;
            pointer-events: none;
            border: 2.5px solid transparent;
            transition: border-color 0.2s;
        }
        /* 涨跌边框色 - 莫兰迪色系 */
        .cell-border.up { border-color: #8FB89E; }
        .cell-border.down { border-color: #C98B8B; }
        .cell-border.flat { border-color: #D4CFC7; }
        /* 观察仓 */
        .cell-border.watch {
            border-style: dashed;
            border-width: 2px;
            background: rgba(255,255,255,0.35);
        }
        .cell-bg {
            position: absolute;
            inset: 0;
            border-radius: 10px;
            background: rgba(255,255,255,0.7);
            transition: background 0.2s;
        }
        .treemap-cell:hover .cell-bg,
        .treemap-cell:active .cell-bg {
            background: rgba(255,255,255,0.95);
        }
        .cell-content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 4px;
            width: 100%;
        }
        .stock-name {
            font-size: 13px;
            font-weight: 600;
            color: #3D3D3D;
            line-height: 1.3;
            word-break: keep-all;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .stock-name.small {
            font-size: 11px;
        }
        .stock-meta {
            font-size: 10px;
            color: #9B958C;
            margin-top: 2px;
            font-variant-numeric: tabular-nums;
        }
        .stock-meta .chg {
            font-weight: 500;
        }
        .stock-meta .chg.up { color: #5A8A6A; }
        .stock-meta .chg.down { color: #B07070; }
        /* 新文档红点 */
        .new-badge {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 8px; height: 8px;
            border-radius: 50%;
            z-index: 5;
            animation: pulse 2s ease-in-out infinite;
        }
        .new-badge.a { background: #C4707A; }
        .new-badge.hk { background: #7FA68B; }
        .new-badge.us { background: #6F97A8; }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.85); }
        }
        /* 小方块只显示缩写 */
        .stock-abbr {
            font-size: 14px;
            font-weight: 700;
            color: #5A5A5A;
        }
        /* 隐藏滚动条但允许滚动 */
        body::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

const marketConfig = {
    "A股": { key: "a", class: "market-a" },
    "港股": { key: "hk", class: "market-hk" },
    "美股": { key: "us", class: "market-us" }
};

// ===== 水平条带 Treemap 算法（手机端优化） =====
function squarify(values, x, y, width, height) {
    const total = values.reduce((s, v) => s + v.value, 0);
    if (total === 0) return values.map(v => ({...v, x, y, w: 0, h: 0}));

    // 按 weight 降序排列，不合并，每只股票都显示
    let items = values.map(v => ({...v, norm: v.value / total})).sort((a, b) => b.norm - a.norm);
    const result = [];
    const MIN_CELL_W = 20;  // 最小宽度 20%
    const MIN_CELL_H = 14;  // 最小高度 14%

    // 水平条带布局：从上到下，每行1-3只
    let remainingH = height;
    let currentY = y;

    while (items.length > 0) {
        // 决定当前行放几只：大单只占一行，其他2-3只
        let rowCount;
        if (items.length === 1) {
            rowCount = 1;
        } else if (items[0].norm > 0.45) {
            rowCount = 1;
        } else if (items.length === 2) {
            rowCount = 2;
        } else {
            rowCount = 3;
        }
        rowCount = Math.min(rowCount, items.length);

        const rowItems = items.slice(0, rowCount);
        const rowSum = rowItems.reduce((s, it) => s + it.norm, 0);

        // 行高度（至少 MIN_CELL_H，最多不超过剩余高度）
        let rowH = (rowSum / total) * height;
        rowH = Math.max(rowH, MIN_CELL_H);
        rowH = Math.min(rowH, remainingH);

        // 行内按 norm 比例分配宽度
        const rowTotal = rowItems.reduce((s, it) => s + it.norm, 0);
        let currentX = x;
        let remainingW = width;

        for (let i = 0; i < rowItems.length; i++) {
            const it = rowItems[i];
            let cellW = (it.norm / rowTotal) * width;
            cellW = Math.max(cellW, MIN_CELL_W);
            cellW = Math.min(cellW, remainingW);
            if (i === rowItems.length - 1) cellW = remainingW;

            result.push({...it, x: currentX, y: currentY, w: cellW, h: rowH});
            currentX += cellW;
            remainingW -= cellW;
        }

        currentY += rowH;
        remainingH -= rowH;
        items = items.slice(rowCount);
    }

    return result;
}

// ===== 行布局算法（固定高度行，宽度按仓位比例） =====
function layoutRows(items, containerW) {
    const total = items.reduce((s, v) => s + v.value, 0);
    if (total === 0) return [];

    const sorted = items.map(v => ({...v, norm: v.value / total})).sort((a, b) => b.norm - a.norm);
    const MIN_CELL_W = 22;  // 最小宽度 %
    const ROW_H = 56;       // 每行固定高度 px
    const result = [];

    while (sorted.length > 0) {
        let rowCount;
        if (sorted.length === 1) rowCount = 1;
        else if (sorted[0].norm > 0.5) rowCount = 1;
        else if (sorted.length === 2) rowCount = 2;
        else rowCount = 3;
        rowCount = Math.min(rowCount, sorted.length);

        const rowItems = sorted.slice(0, rowCount);
        const rowTotal = rowItems.reduce((s, it) => s + it.norm, 0);

        let currentX = 0;
        let remainingW = 100;
        for (let i = 0; i < rowItems.length; i++) {
            const it = rowItems[i];
            let cellW = (it.norm / rowTotal) * 100;
            cellW = Math.max(cellW, MIN_CELL_W);
            cellW = Math.min(cellW, remainingW);
            if (i === rowItems.length - 1) cellW = remainingW;
            result.push({...it, w: cellW, h: ROW_H});
            currentX += cellW;
            remainingW -= cellW;
        }
        sorted.splice(0, rowCount);
    }
    return result;
}

// ===== 渲染 =====
function renderTreemap() {
    const wrap = document.getElementById('treemapWrap');
    wrap.innerHTML = '';

    for (const [marketName, data] of Object.entries(portfolioData)) {
        const config = marketConfig[marketName];

        // 市场容器 - 高度根据行数自动
        const items = data.positions.map(p => ({
            value: p.market_value,
            name: p.name,
            change_rate: p.change_rate,
            role: p.role,
            weight: p.weight
        }));
        const rows = layoutRows(items);
        const rowCount = new Set(rows.map((r, i) => {
            let count = 0, idx = 0;
            for (let j = 0; j <= i; j++) {
                if (j === 0 || (rows[j-1] && rows.slice(0, j).reduce((s, it) => s + it.w, 0) + rows[j].w > 100)) count++;
            }
            return count;
        })).size;
        // 更简单的方法：根据rows数量推算行数
        let actualRows = 0, acc = 0;
        for (const r of rows) {
            if (acc + r.w > 100) { actualRows++; acc = r.w; }
            else if (acc === 0) { actualRows++; acc = r.w; }
            else { acc += r.w; }
        }

        const sectionH = 28 + actualRows * 56; // 标签28px + 每行56px

        const section = document.createElement('div');
        section.className = `market-section ${config.class}`;
        section.style.height = sectionH + 'px';

        // 市场标签
        const label = document.createElement('div');
        label.className = 'market-label';
        label.innerHTML = `<span class="dot"></span>${marketName} · ${data.positions.length}只`;
        section.appendChild(label);

        // 渲染单元格
        let currentY = 28;
        let currentX = 0;
        let rowAcc = 0;

        for (const cell of rows) {
            if (rowAcc + cell.w > 100 + 0.1) {
                currentY += 56;
                currentX = 0;
                rowAcc = 0;
            }

            const pos = data.positions.find(p => p.name === cell.name);
            if (!pos) continue;

            const el = document.createElement('a');
            el.className = 'treemap-cell';
            el.href = '#';
            el.style.left = currentX + '%';
            el.style.top = currentY + 'px';
            el.style.width = cell.w + '%';
            el.style.height = cell.h + 'px';

            const isWatch = pos.role === '观察';
            const chgClass = pos.change_rate > 0 ? 'up' : pos.change_rate < 0 ? 'down' : 'flat';
            const watchClass = isWatch ? 'watch' : '';

            const showFull = cell.w > 22;
            const showMeta = cell.w > 28;

            let nameDisplay = pos.name;
            if (!showFull && pos.name.length > 3) {
                nameDisplay = pos.name.substring(0, 2) + '..';
            }

            el.innerHTML = `
                <div class="cell-bg"></div>
                <div class="cell-border ${chgClass} ${watchClass}"></div>
                <div class="cell-content">
                    <div class="stock-name ${!showFull ? 'small' : ''}">${nameDisplay}</div>
                    ${showMeta ? `<div class="stock-meta">
                        <span class="chg ${chgClass}">${pos.change_rate > 0 ? '+' : ''}${pos.change_rate}%</span>
                        <span>· ${pos.weight}%</span>
                    </div>` : ''}
                </div>
            `;

            section.appendChild(el);
            currentX += cell.w;
            rowAcc += cell.w;
        }

        wrap.appendChild(section);
    }
}

// 初始化
window.addEventListener('load', renderTreemap);
window.addEventListener('resize', () => {
    document.getElementById('treemapWrap').innerHTML = '';
    renderTreemap();
});
