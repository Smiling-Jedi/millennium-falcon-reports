    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #f9f8f6;
            --paper: #fffefd;
            --ink: #4a4a48;
            --ink-light: #8a8a88;
            --line: #e8e6e3;
            --red: #c98b8b;
            --green: #8fbfa3;
            --blue: #8fa8bf;
            --yellow: #d4b483;
            --gray: #b8b8b8;
            --dot: #8fa8bf;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--ink);
            padding: 32px 22px 56px;
            max-width: 540px;
            margin: 0 auto;
            line-height: 1.7;
            font-size: 16px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
        }
        .logo-area img {
            width: 48px;
            height: 48px;
            border-radius: 12px;
        }
        .logo-text {
            font-family: "Noto Serif SC", "Source Han Serif SC", "Songti SC", "STSong", serif;
            font-size: 13px;
            color: var(--ink-light);
            letter-spacing: 1px;
            line-height: 1.5;
        }
        .logo-text strong {
            display: block;
            font-size: 22px;
            color: var(--ink);
            font-weight: 600;
            letter-spacing: 3px;
        }

        .tab-bar {
            display: flex;
            border-bottom: 1px solid var(--line);
            margin-bottom: 0;
            background: var(--bg);
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 14px 0 12px;
            font-size: 16px;
            font-weight: 400;
            color: var(--ink-light);
            cursor: pointer;
            position: relative;
            transition: color .2s;
            letter-spacing: 0.5px;
        }
        .tab.active { color: var(--ink); font-weight: 500; }
        .tab::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 25%;
            right: 25%;
            height: 2px;
            border-radius: 2px 2px 0 0;
            background: transparent;
            transition: background .2s;
        }
        .tab.active[data-market="a"]::after { background: var(--red); }
        .tab.active[data-market="hk"]::after { background: var(--green); }
        .tab.active[data-market="us"]::after { background: var(--blue); }

        .mid-bar {
            background: var(--paper);
            border: 1px solid var(--line);
            border-top: none;
            border-radius: 0 0 12px 12px;
            padding: 14px 18px;
            margin-bottom: 26px;
        }
        .mid-bar-title {
            font-size: 13px;
            font-weight: 500;
            color: var(--ink);
            display: flex;
            justify-content: space-between;
            align-items: center;
            letter-spacing: 0.5px;
        }
        .mid-bar-title a {
            font-size: 12px;
            color: var(--ink-light);
            text-decoration: none;
            font-weight: 400;
        }
        .mid-link {
            display: block;
            text-decoration: none;
            color: var(--ink);
            font-size: 15px;
            margin-top: 6px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .mid-date {
            font-size: 12px;
            color: var(--ink-light);
            margin-right: 8px;
            font-variant-numeric: tabular-nums;
        }
        .mid-empty { font-size: 15px; color: var(--ink-light); }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; animation: fadeIn .25s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

        .section-title {
            display: flex;
            align-items: center;
            font-size: 13px;
            font-weight: 500;
            color: var(--ink-light);
            margin: 24px 0 12px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .section-title::before {
            content: '';
            width: 5px;
            height: 5px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .section-title.main::before { background: var(--ink-light); }
        .section-title.watch::before { background: var(--yellow); }
        .section-title.follow::before { background: var(--gray); }
        .section-count {
            font-size: 12px;
            color: var(--ink-light);
            margin-left: 6px;
            font-weight: 400;
        }

        .treemap-wrap {
            width: 100%;
            height: 400px;
            background: var(--paper);
            border: 1px solid var(--line);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }
        .treemap-cell {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            color: #fff;
            padding: 8px;
            border: 2px solid var(--bg);
            transition: opacity .15s;
            overflow: hidden;
        }
        .treemap-cell:hover { opacity: 0.85; }
        .treemap-cell:active { transform: scale(0.99); }
        .treemap-cell.up { background: var(--red); }
        .treemap-cell.down { background: var(--green); }
        .treemap-cell.flat { background: var(--gray); color: var(--ink); }
        .treemap-cell .name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 100%;
        }
        .new-dot {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.1);
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.35; }
        }

        .follow-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .follow-item {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 400;
            background: var(--paper);
            border: 1px solid var(--gray);
            color: var(--ink-light);
            padding: 0 16px;
            position: relative;
        }

        .update-hint {
            font-size: 12px;
            color: var(--ink-light);
            margin-top: 26px;
            padding-top: 14px;
            border-top: 1px solid var(--line);
            text-align: center;
            letter-spacing: 0.5px;
        }

        .footer {
            margin-top: 48px;
            padding-top: 18px;
            border-top: 1px solid var(--line);
            font-size: 12px;
            color: var(--ink-light);
            text-align: center;
            letter-spacing: 0.5px;
        }

// Squarified Treemap 算法
function squarify(items, x, y, w, h) {
    if(items.length===0) return [];
    var total = items.reduce(function(s,it){return s+it.weight;},0);
    items.forEach(function(it){ it._norm = it.weight/total; });
    var rows = [];
    var row = [];
    var rowSum = 0;
    var container = {x:x, y:y, w:w, h:h};

    function worstRatio(row, w) {
        if(row.length===0) return Infinity;
        var s = row.reduce(function(a,b){return a+b._norm;},0);
        var min = Math.min.apply(null, row.map(function(it){return it._norm;}));
        var max = Math.max.apply(null, row.map(function(it){return it._norm;}));
        return Math.max(w*w*max/(s*s), s*s/(w*w*min));
    }

    function layoutRow(row, container) {
        var rowWeight = row.reduce(function(s,it){return s+it._norm;},0);
        var alongWidth = container.w <= container.h; // 沿短边排列，行长边
        var cells = [];
        if(alongWidth){
            var rowH = container.h * rowWeight;
            var cursor = 0;
            row.forEach(function(it){
                var cw = container.w * (it._norm / rowWeight);
                cells.push({item:it, x:container.x+cursor, y:container.y, w:cw, h:rowH});
                cursor += cw;
            });
            return {cells:cells, remaining:{x:container.x, y:container.y+rowH, w:container.w, h:container.h-rowH}};
        } else {
            var rowW = container.w * rowWeight;
            var cursor = 0;
            row.forEach(function(it){
                var ch = container.h * (it._norm / rowWeight);
                cells.push({item:it, x:container.x, y:container.y+cursor, w:rowW, h:ch});
                cursor += ch;
            });
            return {cells:cells, remaining:{x:container.x+rowW, y:container.y, w:container.w-rowW, h:container.h}};
        }
    }

    items.forEach(function(it){
        if(row.length===0){
            row.push(it);
            rowSum += it._norm;
        } else {
            var side = Math.min(container.w, container.h);
            var cur = worstRatio(row, side);
            var next = worstRatio(row.concat([it]), side);
            if(next <= cur){
                row.push(it);
                rowSum += it._norm;
            } else {
                var lr = layoutRow(row, container);
                rows.push.apply(rows, lr.cells);
                container = lr.remaining;
                row = [it];
                rowSum = it._norm;
            }
        }
    });
    if(row.length>0){
        var lr = layoutRow(row, container);
        rows.push.apply(rows, lr.cells);
    }
    return rows;
}

function renderTreemap(market){
    var wrap = document.getElementById('treemap-'+market);
    if(!wrap) return;
    wrap.innerHTML = '';
    var data = treemapData[market];
    var cells = squarify(data, 0, 0, 100, 100);
    cells.forEach(function(cell){
        var el = document.createElement('a');
        el.className = 'treemap-cell ' + cell.item.change;
        el.href = '#';
        el.style.left = cell.x + '%';
        el.style.top = cell.y + '%';
        el.style.width = cell.w + '%';
        el.style.height = cell.h + '%';
        el.setAttribute('data-stock', cell.item.name);
        el.setAttribute('data-date', cell.item.date);
        el.setAttribute('data-market', market);
        var name = document.createElement('span');
        name.className = 'name';
        name.textContent = cell.item.name;
        el.appendChild(name);
        if(cell.item.new){
            var dot = document.createElement('span');
            dot.className = 'new-dot';
            el.appendChild(dot);
        }
        wrap.appendChild(el);
    });
}

(function(){
    var K='mf_holdings_seen_';
    function bindDots(){
        var items=document.querySelectorAll('.treemap-cell[data-stock], .follow-item[data-stock]');
        var maxDt={};
        items.forEach(function(e){
            var n=e.getAttribute('data-stock');
            var d=e.getAttribute('data-date')||'';
            if(!maxDt[n]||d>maxDt[n])maxDt[n]=d;
        });
        items.forEach(function(e){
            var n=e.getAttribute('data-stock');
            var d=e.getAttribute('data-date')||'';
            var dot=e.querySelector('.new-dot');
            if(!dot)return;
            var seen=localStorage.getItem(K+n)||'';
            if(d<=seen) dot.style.display='none';
            e.addEventListener('click',function(){
                localStorage.setItem(K+n,maxDt[n]||d);
                dot.style.display='none';
            });
        });
    }
    ['a','hk','us'].forEach(renderTreemap);
    bindDots();
})();

function switchTab(m) {
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.market === m));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + m));
    document.querySelectorAll('[id^="mid-bar-"]').forEach(b => b.style.display = b.id === 'mid-bar-' + m ? 'block' : 'none');
}
