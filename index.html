<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>千年隼日报</title>
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="千年隼">
    <meta name="theme-color" content="#1e293b">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #fafbfc;
            color: #2c3e50;
            padding: 36px 24px 48px;
            max-width: 480px;
            margin: 0 auto;
            line-height: 1.6;
        }
        .logo-img {
            width: 24px;
            height: 24px;
            border-radius: 5px;
            vertical-align: middle;
            margin-right: 6px;
            position: relative;
            top: -2px;
        }
        .back {
            font-size: 13px;
            color: #94a3b8;
            text-decoration: none;
            margin-bottom: 20px;
            display: inline-block;
        }
        .back:hover { color: #64748b; }
        h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }
        .subtitle {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 28px;
        }
        .update-badge {
            display: inline-block;
            font-size: 11px;
            color: #64748b;
            margin-bottom: 24px;
        }
        .menu-item {
            display: block;
            padding: 18px 0;
            text-decoration: none;
            color: #2c3e50;
            font-size: 16px;
            font-weight: 500;
            border-bottom: 1px solid #f0f0f0;
        }
        .menu-item:last-child { border-bottom: none; }
        .menu-item:active { color: #2563eb; }
        .menu-count {
            display: inline-block;
            background: #e8edf2;
            color: #64748b;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 6px;
            font-weight: 500;
            vertical-align: middle;
        }
        /* 市场标签色 */
        .mkt-a { color: #dc2626; }
        .mkt-hk { color: #16a34a; }
        .mkt-us { color: #2563eb; }
        h2 .mkt-dot {
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle;
            position: relative;
            top: -1px;
        }
        .mkt-dot-a { background: #dc2626; }
        .mkt-dot-hk { background: #16a34a; }
        .mkt-dot-us { background: #2563eb; }
        h2 {
            font-size: 13px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 32px 0 12px;
        }
        h3 {
            font-size: 14px;
            font-weight: 600;
            color: #475569;
            margin: 20px 0 10px;
        }
        .stock-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .stock-item {
            padding: 7px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 4px;
            text-decoration: none;
            color: #475569;
            font-size: 16px;
            transition: all .15s;
        }
        .stock-item:active { border-color: #2563eb; color: #2563eb; background: #f0f5ff; }
        .stock-item-up { border-color: #fecaca; background: transparent; color: #475569; }
        .stock-item-down { border-color: #a5d6a7; background: transparent; color: #475569; }
        .up { color: #16a34a; font-weight: 500; }
        .down { color: #dc2626; font-weight: 500; }
        .report-link {
            display: block;
            padding: 14px 0;
            border-bottom: 1px solid #f0f0f0;
            text-decoration: none;
            color: #2c3e50;
            font-size: 15px;
        }
        .report-link:last-child { border-bottom: none; }
        .report-link:active { color: #2563eb; }
        .report-date {
            display: inline-block;
            font-size: 12px;
            font-weight: 500;
            margin-right: 10px;
            font-variant-numeric: tabular-nums;
        }
        .report-date.new { color: #2563eb; }
        .report-date.today { color: #dc2626; }
        .report-date.chg-up { color: #fca5a5; }
        .report-date.chg-down { color: #81c784; }
        .stock-code {
            font-size: 12px;
            color: #94a3b8;
            margin-left: 6px;
            font-weight: 400;
        }
        .mkt-tag {
            display: inline-block;
            font-size: 10px;
            font-weight: 600;
            padding: 1px 6px;
            border-radius: 3px;
            margin-right: 6px;
            vertical-align: middle;
            position: relative;
            top: -1px;
        }
        .mkt-tag-a { background: #fef2f2; color: #dc2626; }
        .mkt-tag-hk { background: #f0fdf4; color: #16a34a; }
        .mkt-tag-us { background: #eff6ff; color: #2563eb; }
        .page-intro {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 24px;
        }
        .footer {
            margin-top: 48px;
            padding-top: 16px;
            border-top: 1px solid #e2e8f0;
            font-size: 11px;
            color: #94a3b8;
        }
        .new-dot {
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 50%;
            margin-right: 4px;
            vertical-align: middle;
            position: relative;
            top: -1px;
            animation: pulse-dot 2s ease-in-out infinite;
        }
        .new-dot-a { background: #dc2626; }
        .new-dot-hk { background: #16a34a; }
        .new-dot-us { background: #2563eb; }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .new-dot-sm {
            display: inline-block;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #2563eb;
            margin-right: 6px;
            vertical-align: middle;
            position: relative;
            top: -2px;
            animation: pulse-dot 2s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <h1><img src="favicon-32x32.png" class="logo-img" alt="">千年隼日报</h1>
    <p class="page-intro">每日收盘后自动生成</p>
    <a href="holdings.html" id="card-holdings" style="
        display: block;
        padding: 28px 24px;
        margin-bottom: 16px;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        text-decoration: none;
    ">
        <div style="font-weight:700;font-size:18px;color:#1e293b;margin-bottom:4px">持仓股 <span id="dots-holdings"></span></div>
        <div style="font-size:13px;color:#94a3b8">A股 · 港股 · 美股</div>
    </a>
    <a href="watchlist.html" id="card-watchlist" style="
        display: block;
        padding: 28px 24px;
        margin-bottom: 16px;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        text-decoration: none;
    ">
        <div style="font-weight:700;font-size:18px;color:#1e293b;margin-bottom:4px">关注股 <span id="dots-watchlist"></span></div>
        <div style="font-size:13px;color:#94a3b8">跟踪观察列表</div>
    </a>
    <script id="mf-idx-data" type="application/json">{"holdings": {"a": "2026-06-04", "hk": "2026-06-04", "us": "2026-06-04"}, "watchlist": {}}</script>
<script>
(function(){
var dataEl=document.getElementById('mf-idx-data');
if(!dataEl)return;
var data=JSON.parse(dataEl.textContent);
var colors={a:'new-dot-a',hk:'new-dot-hk',us:'new-dot-us'};
function checkCard(cardId,prefix,dates){
var container=document.getElementById('dots-'+cardId);
if(!container||!dates)return;
var keys=Object.keys(dates);
for(var i=0;i<keys.length;i++){
var mk=keys[i];
var key='mf_idx_'+prefix+'_'+mk;
var seen=localStorage.getItem(key)||'';
if(dates[mk]>seen){
var dot=document.createElement('span');
dot.className='new-dot '+(colors[mk]||'new-dot-us');
container.appendChild(dot);
}}
var card=document.getElementById('card-'+cardId);
if(card){card.addEventListener('click',function(){
for(var j=0;j<keys.length;j++){
var m=keys[j];
localStorage.setItem('mf_idx_'+prefix+'_'+m,dates[m]);
}});}}
checkCard('holdings','h',data.holdings);
checkCard('watchlist','w',data.watchlist);
})();
window.addEventListener('pageshow',function(e){if(e.persisted)location.reload();});
</script>    <div class="footer">千年隼 Millennium Falcon · 最后更新 2026-06-05 15:00</div>
</body>
</html>
